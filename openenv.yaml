name: contract-negotiation-env

description: >
  An environment that simulates contract clause evaluation.

actions:
  - accept
  - propose_edit
  - escalate

observation_space:
  clause: string
  policy: string
  risk_level: string
  vendor_importance: string

reward:
  type: dense

tasks:
  - name: easy
    grader: graders.easy.grade
  - name: medium
    grader: graders.medium.grade
  - name: hard
    grader: graders.hard.grade
