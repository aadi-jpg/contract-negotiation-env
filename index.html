```
<h1>📄 Contract Negotiation Environment</h1>

<div class="card">
    <h3>Clause</h3>
    <p id="clause">Loading...</p>

    <h3>Policy</h3>
    <p id="policy">Loading...</p>

    <h3>Risk Level</h3>
    <p id="risk"></p>

    <h3>Vendor Importance</h3>
    <p id="vendor"></p>
</div>

<div>
    <button class="accept" onclick="takeAction('accept')">Accept</button>
    <button class="edit" onclick="takeAction('propose_edit')">Propose Edit</button>
    <button class="escalate" onclick="takeAction('escalate')">Escalate</button>
</div>

<div class="reward" id="reward"></div>

<script>
    // 🔴 CHANGE THIS TO YOUR HF SPACE URL
    const API_URL = "https://aadiv123-contract-env.hf.space";

    async function resetEnv() {
        await fetch(`${API_URL}/reset`, { method: "POST" });
        loadState();
        document.getElementById("reward").innerText = "";
    }

    async function loadState() {
        const res = await fetch(`${API_URL}/state`);
        const data = await res.json();

        // ✅ IMPORTANT: state is nested
        const s = data.state;

        document.getElementById("clause").innerText = s.clause;
        document.getElementById("policy").innerText = s.policy;
        document.getElementById("risk").innerText = s.risk_level;
        document.getElementById("vendor").innerText = s.vendor_importance;
    }

    async function takeAction(action) {
        const res = await fetch(`${API_URL}/step`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ action: action })
        });

        const data = await res.json();

        loadState();

        document.getElementById("reward").innerText =
            `Reward: ${data.reward} | Done: ${data.done}`;
    }

    // Load automatically
    resetEnv();
</script>
```
